apiVersion: v1
kind: Secret
metadata:
  name: pdf-service-secrets
  namespace: default
type: Opaque
stringData:
  DB_PASSWORD: "secret"
  AWS_ACCESS_KEY_ID: "<your-aws-key>"
  AWS_SECRET_ACCESS_KEY: "<your-aws-secret>"
  AZURE_STORAGE_CONNECTION_STRING: "<your-azure-connection-string>"
  AZURE_CONTAINER_NAME: "pdfs"
