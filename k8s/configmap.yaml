apiVersion: v1
kind: ConfigMap
metadata:
  name: pdf-service-config
data:
  DB_HOST: "pdf-service-mysql"
  DB_PORT: "3306"
  DB_DATABASE: "pdf_service"
  DB_USERNAME: "root"
  REDIS_HOST: "pdf-service-redis"
  REDIS_PORT: "6379"
  STORAGE_BACKEND: "s3"
  S3_REGION: "us-east-1"
  PRESIGNED_URL_TTL: "1800"
