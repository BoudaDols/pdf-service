name: CD

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pdf-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/pdf-service:${{ github.sha }}

  deploy-aws:
    name: Deploy to AWS EKS
    runs-on: ubuntu-latest
    needs: build
    env:
      NAMESPACE: default
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Update secrets
        run: |
          kubectl create secret generic pdf-service-secrets \
            --namespace="${NAMESPACE}" \
            --from-literal=DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            --from-literal=AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            --from-literal=AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            --dry-run=client -o yaml | kubectl apply -f - --validate=false

      - name: Apply manifests
        run: kubectl apply -f k8s/

      - name: Update image tag
        run: |
          kubectl set image deployment/pdf-service \
            pdf-service="${{ secrets.DOCKERHUB_USERNAME }}/pdf-service:${{ github.sha }}" \
            -n "${NAMESPACE}"

      - name: Wait for rollout
        run: kubectl rollout status deployment/pdf-service -n ${{ env.NAMESPACE }} --timeout=300s

  # ─────────────────────────────────────────────
  # Deploy to Azure AKS
  # ─────────────────────────────────────────────
  deploy-azure:
    name: Deploy to Azure AKS
    runs-on: ubuntu-latest
    needs: build
    if: false  # Disabled — not using Azure yet
    env:
      NAMESPACE: default

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update kubeconfig
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - name: Update secrets
        run: |
          kubectl create secret generic pdf-service-secrets \
            --namespace="${NAMESPACE}" \
            --from-literal=DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            --from-literal=AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            --from-literal=AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            --from-literal=AZURE_STORAGE_CONNECTION_STRING="${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply manifests
        run: kubectl apply -f k8s/

      - name: Update image tag
        run: |
          kubectl set image deployment/pdf-service \
            pdf-service="${{ secrets.DOCKERHUB_USERNAME }}/pdf-service:${{ github.sha }}" \
            -n "${NAMESPACE}"

      - name: Wait for rollout
        run: kubectl rollout status deployment/pdf-service -n ${{ env.NAMESPACE }} --timeout=120s
